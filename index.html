function useScreen() {
  const [w, setW] = useState(window.innerWidth);
  useEffect(() => { const h = () => setW(window.innerWidth); window.addEventListener("resize", h); return () => window.removeEventListener("resize", h); }, []);
  return { mob: w < 640, tab: w >= 640 && w < 1024 };
}

function useFadeIn(threshold = 0.15) {
  const ref = useRef(null);
  const [vis, setVis] = useState(false);
  useEffect(() => { const el = ref.current; if (!el) return; const o = new IntersectionObserver(([e]) => { if (e.isIntersecting) { setVis(true); o.unobserve(el); } }, { threshold }); o.observe(el); return () => o.disconnect(); }, [threshold]);
  return { ref, style: { opacity: vis ? 1 : 0, transform: vis ? "translateY(0)" : "translateY(32px)", transition: "opacity 0.7s cubic-bezier(.22,1,.36,1), transform 0.7s cubic-bezier(.22,1,.36,1)" } };
}

function Reveal({ children, delay = 0 }) {
  const f = useFadeIn();
  return <div ref={f.ref} style={{ ...f.style, transitionDelay: `${delay}s` }}>{children}</div>;
}

function Hamburger({ open }) {
  const bar = (r, o, y) => ({ width: 20, height: 2, background: C.cream, borderRadius: 1, transition: "all 0.3s ease", transform: r, opacity: o, position: "absolute", top: y });

}

                {/* QR */}
                <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 16px", background: C.greenCard, borderRadius: 8, border: `1px dashed ${C.goldBorder}` }}>
                  <span style={{ fontSize: 20, opacity: 0.3 }}>⊟</span>
                  <span style={{ color: C.creamSoft, fontSize: 11, fontFamily: "'Neue Haas', sans-serif" }}>{t.showcase.qr}</span>
                </div>
              </div>
            </div>
          </Reveal>

          {/* Additional project scans */}
          <Reveal delay={0.2}>
            <div style={{ display: "flex", gap: mob ? 12 : 20, flexWrap: "wrap" }}>
              {t.showcase.projects.map((proj, i) => (
                <div key={i} className="ps-scan-card" style={{ flex: "1 1 280px", background: C.greenCard, borderRadius: 12, border: `1px solid ${C.border}`, overflow: "hidden" }}>
                  <div style={{ height: mob ? 120 : 180, background: `linear-gradient(145deg, rgba(0,83,49,0.4), rgba(0,42,27,0.5))`, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 8, position: "relative" }}>
                    <div style={{ position: "absolute", inset: 0, background: `repeating-linear-gradient(45deg, transparent, transparent 35px, rgba(222,176,71,0.03) 35px, rgba(222,176,71,0.03) 36px)` }} />
                    <span style={{ fontSize: 28, opacity: 0.2, zIndex: 1 }}>◎</span>
                    <span style={{ color: C.creamSoft, fontSize: 10, fontFamily: "'Neue Haas', sans-serif", zIndex: 1 }}>{proj.type}</span>
                  </div>
                  <div style={{ padding: mob ? "14px 16px" : "18px 22px" }}>
                    <div style={{ fontSize: mob ? 15 : 16, fontWeight: 700, color: C.cream, marginBottom: 4 }}>{proj.title}</div>
                    <div style={{ fontSize: 13, color: C.creamSoft, lineHeight: 1.5, marginBottom: 12 }}>{proj.desc}</div>
                    <span style={{ color: C.gold, fontSize: 13, fontWeight: 600 }}>{t.showcase.explore}</span>
                  </div>
                </div>
              ))}
            </div>
          </Reveal>
        </section>

        <div style={{ height: 1, background: `linear-gradient(90deg, transparent, ${C.goldBorder}, transparent)` }} />

        {/* GALLERY */}
        <section id="portfolio" style={{ padding: mob ? "36px 0" : "64px 0", scrollMarginTop: 60 }}>
          <Reveal>
            <p style={{ textTransform: "uppercase", fontSize: 11, letterSpacing: 4, color: C.gold, fontWeight: 600, marginBottom: 8 }}>{t.gallery.tag}</p>
            <h2 style={{ fontSize: mob ? 26 : 34, fontFamily: "'Neue Haas', sans-serif", fontWeight: 700, margin: "0 0 12px" }}>{t.gallery.title}</h2>
            <p style={{ color: C.creamSoft, fontSize: mob ? 14 : 15, marginBottom: mob ? 24 : 36 }}>{t.gallery.desc}</p>
          </Reveal>
          <div style={{ display: "grid", gridTemplateColumns: mob ? "repeat(2, 1fr)" : tab ? "repeat(3, 1fr)" : "repeat(4, 1fr)", gap: mob ? 10 : 16 }}>
            {t.gallery.items.map((item, i) => (
              <Reveal key={i} delay={i * 0.05}>
                <div className="ps-gallery-item" style={{ background: C.greenCard, borderRadius: 10, overflow: "hidden", border: `1px solid ${C.border}` }}>
                  <Img label={item} h={mob ? 100 : 160} style={{ borderRadius: 0, border: "none" }} />
                  <div style={{ padding: mob ? "10px 12px" : "14px 18px" }}><span style={{ fontSize: mob ? 11 : 13, fontWeight: 600, color: C.cream }}>{item}</span></div>
                </div>
              </Reveal>
            ))}
          </div>
        </section>

        <div style={{ height: 1, background: `linear-gradient(90deg, transparent, ${C.goldBorder}, transparent)` }} />

        {/* WHY */}
        <section style={{ padding: mob ? "36px 0" : "64px 0" }}>
          <Reveal>
            <h2 style={{ fontSize: mob ? 24 : 30, fontFamily: "'Neue Haas', sans-serif", fontWeight: 700, margin: "0 0 28px", textAlign: "center" }}>
              {t.why.title[0]}<span style={{ color: C.gold }}>{t.why.title[1]}</span>{t.why.title[2]}
            </h2>
          </Reveal>
          <div style={{ display: "flex", gap: mob ? 12 : 20, flexWrap: "wrap", justifyContent: "center" }}>
            {t.why.cards.map((c, i) => (
              <Reveal key={i} delay={i * 0.1}>
                <div className="ps-card" style={{ flex: "1 1 240px", maxWidth: mob ? "100%" : 300, width: mob ? "100%" : undefined, textAlign: "center", padding: mob ? 22 : 32, background: C.greenCard, borderRadius: 12, border: `1px solid ${C.border}`, boxSizing: "border-box" }}>
                  <div style={{ fontSize: mob ? 28 : 36, color: C.gold, marginBottom: 12, filter: "drop-shadow(0 0 10px rgba(222,176,71,0.15))" }}>{c.icon}</div>
                  <div style={{ fontSize: mob ? 16 : 17, fontWeight: 700, marginBottom: 8 }}>{c.t}</div>
                  <div style={{ fontSize: mob ? 13 : 14, color: C.creamSoft, lineHeight: 1.6 }}>{c.d}</div>
                </div>
              </Reveal>
            ))}
          </div>
        </section>

        <div style={{ height: 1, background: `linear-gradient(90deg, transparent, ${C.goldBorder}, transparent)` }} />

        {/* CONTACT */}
        <section id="contact" style={{ padding: mob ? "36px 0 48px" : "64px 0 80px", scrollMarginTop: 60 }}>
          <Reveal>
            <p style={{ textTransform: "uppercase", fontSize: 11, letterSpacing: 4, color: C.gold, fontWeight: 600, marginBottom: 8 }}>{t.contact.tag}</p>
            <h2 style={{ fontSize: mob ? 26 : 34, fontFamily: "'Neue Haas', sans-serif", fontWeight: 700, margin: "0 0 12px" }}>{t.contact.title}</h2>
            <p style={{ color: C.creamSoft, fontSize: mob ? 14 : 15, marginBottom: mob ? 28 : 40, maxWidth: 500 }}>{t.contact.desc}</p>
          </Reveal>
          <Reveal delay={0.1}>
            <div style={{ display: "flex", gap: mob ? 28 : 48, flexDirection: mob ? "column" : "row", flexWrap: "wrap" }}>
              <div style={{ flex: "1 1 280px", minWidth: 0 }}>
                {["prenom", "nom", "email"].map((k) => (
                  <div key={k} style={{ marginBottom: 18 }}>
                    <label style={{ display: "block", fontSize: 11, fontWeight: 600, marginBottom: 7, color: C.creamSoft, textTransform: "uppercase", letterSpacing: 1.2 }}>{t.contact.fields[k]}</label>
                    <input type={k === "email" ? "email" : "text"} className="ps-input" value={form[k]} onChange={(e) => setForm({ ...form, [k]: e.target.value })} style={{ width: "100%", padding: "12px 16px", background: "rgba(0,83,49,0.4)", border: `1px solid ${C.border}`, borderRadius: 6, color: C.cream, fontSize: 14, outline: "none", boxSizing: "border-box" }} />
                  </div>
                ))}
                <div style={{ marginBottom: 18 }}>
                  <label style={{ display: "block", fontSize: 11, fontWeight: 600, marginBottom: 7, color: C.creamSoft, textTransform: "uppercase", letterSpacing: 1.2 }}>{t.contact.fields.message}</label>
                  <textarea rows={4} className="ps-input" value={form.message} onChange={(e) => setForm({ ...form, message: e.target.value })} style={{ width: "100%", padding: "12px 16px", background: "rgba(0,83,49,0.4)", border: `1px solid ${C.border}`, borderRadius: 6, color: C.cream, fontSize: 14, outline: "none", resize: "vertical", boxSizing: "border-box" }} />
                </div>
                <button className="ps-btn-gold" style={{ padding: "14px 36px", background: C.gold, color: C.green, border: "none", borderRadius: 6, fontWeight: 700, fontSize: 15, cursor: "pointer", width: mob ? "100%" : "auto" }}>{t.contact.send}</button>
              </div>
              <div style={{ flex: mob ? "1 1 100%" : "0 0 280px", minWidth: 0 }}>
                <div className="ps-card" style={{ padding: mob ? 22 : 28, background: C.greenCard, borderRadius: 12, border: `1px solid ${C.border}` }}>
                  {[{ lbl: t.contact.lbl, lines: ["Louis Dallaire", "ldallaire@pointspace.ca", "(514) 606-9604"] }, { lbl: t.contact.hq, lines: ["2211 Rue de la Métropole", "Longueuil, QC, J4G 1S5"] }, { lbl: t.contact.sat, lines: ["3700, rue Saint-Patrick, unité 312", "Montréal, QC, H4E 1A2"] }].map((block, bi) => (
                    <div key={bi} style={{ marginBottom: 20 }}>
                      <div style={{ fontSize: 10, textTransform: "uppercase", letterSpacing: 1.5, color: C.gold, marginBottom: 6, fontWeight: 600 }}>{block.lbl}</div>
                      {block.lines.map((line, li) => <div key={li} style={{ fontSize: 13, color: li === 0 && bi === 0 ? C.cream : C.creamSoft, fontWeight: li === 0 && bi === 0 ? 600 : 400, lineHeight: 1.7 }}>{line}</div>)}
                    </div>
                  ))}
                  <div>
                    <div style={{ fontSize: 10, textTransform: "uppercase", letterSpacing: 1.5, color: C.gold, marginBottom: 6, fontWeight: 600 }}>{t.contact.web}</div>
                    <a href="https://www.pointspace.ca" target="_blank" rel="noopener noreferrer" className="ps-link" style={{ color: C.gold, fontSize: 13, textDecoration: "none", borderBottom: "1px solid transparent", paddingBottom: 1 }}>pointspace.ca</a>
                    <span style={{ margin: "0 10px", color: C.border }}>|</span>
                    <a href="https://ca.linkedin.com/company/pointspace" target="_blank" rel="noopener noreferrer" className="ps-link" style={{ color: C.gold, fontSize: 13, textDecoration: "none", borderBottom: "1px solid transparent", paddingBottom: 1 }}>LinkedIn</a>
                  </div>
                </div>
              </div>
            </div>
          </Reveal>
        </section>
      </div>

      <footer style={{ padding: mob ? "20px 20px" : "28px 56px", borderTop: `1px solid ${C.border}`, display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8, fontSize: 12, color: C.creamSoft, position: "relative", zIndex: 1 }}>
        <span>{t.footer}</span>
        <Logo h={22} />
      </footer>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<PointSpacePortfolio />);
  </script>
</body>
</html>
